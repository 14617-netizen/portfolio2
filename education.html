<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติการศึกษา</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Tahoma,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;

    background:
    radial-gradient(circle at top left,#ffffff55 0%,transparent 25%),
    radial-gradient(circle at bottom right,#ffffff33 0%,transparent 30%),
    linear-gradient(135deg,#d8d8d8,#9d9d9d,#707070);
}

/* ลายจุด */

body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:radial-gradient(rgba(255,255,255,.18) 2px,transparent 2px);
    background-size:40px 40px;
}

/* วงกลม */

.bg1,.bg2,.bg3{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:.45;
    animation:floatbg 10s ease-in-out infinite;
}

.bg1{
    width:300px;
    height:300px;
    background:white;
    top:-80px;
    left:-80px;
}

.bg2{
    width:250px;
    height:250px;
    background:#bdbdbd;
    right:-70px;
    bottom:-70px;
    animation-delay:3s;
}

.bg3{
    width:180px;
    height:180px;
    background:#ececec;
    top:55%;
    left:65%;
    animation-delay:6s;
}

@keyframes floatbg{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-25px);}
}

/* กล่อง */

.container{
    width:700px;
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 35px rgba(0,0,0,.35);
    position:relative;
    z-index:2;
}

h1{
    text-align:center;
    color:#444;
    margin-bottom:35px;
}

/* Timeline */

.timeline{
    border-left:5px solid #666;
    margin-left:30px;
    padding-left:30px;
}

.card{
    position:relative;
    background:#f8f8f8;
    margin-bottom:30px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 12px rgba(0,0,0,.1);
    transition:.3s;
}

.card:hover{
    transform:translateX(10px);
    background:#eeeeee;
}

.card::before{
    content:"";
    position:absolute;
    width:18px;
    height:18px;
    background:#666;
    border-radius:50%;
    left:-42px;
    top:25px;
}

.card h2{
    color:#444;
    margin-bottom:10px;
}

.card p{
    color:#555;
    line-height:1.7;
}

/* ปุ่ม */

.back{
    display:block;
    width:220px;
    margin:30px auto 0;
    text-align:center;
    text-decoration:none;
    background:#666;
    color:white;
    padding:13px;
    border-radius:12px;
    font-size:18px;
    transition:.3s;
}

.back:hover{
    background:#333;
    transform:scale(1.05);
}

/* หมา แมว */

.dog,.cat{
    position:absolute;
    top:-120px;
    font-size:60px;
    animation:fall 6s linear infinite;
}

.dog{
    left:15%;
}

.cat{
    right:15%;
    animation-delay:3s;
}

@keyframes fall{

0%{
transform:translateY(-120px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}

}

</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>

<div class="dog">🐶</div>
<div class="cat">🐱</div>

<div class="container">

<h1>🎓 ประวัติการศึกษา</h1>

<div class="timeline">

<div class="card">
<h2>📘 ระดับมัธยมศึกษาตอนต้น</h2>
<p><b>โรงเรียน :</b> โรงเรียนพานทองต้นสน</p>
<p><b>สำเร็จการศึกษา :</b> ชั้นมัธยมศึกษาปีที่ 3</p>
</div>

<div class="card">
<h2>📗 ระดับมัธยมศึกษาตอนปลาย</h2>
<p><b>โรงเรียน :</b> โรงเรียนพานทอง</p>
<p><b>กำลังศึกษา :</b> ชั้นมัธยมศึกษาปีที่ 6</p>
<p><b>สถานะ :</b> กำลังศึกษา</p>
</div>

</div>

<a href="index.html" class="back">🏠 กลับหน้าหลัก</a>

</div>

</body>
</html>
