<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio นายกฤษฎา</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Tahoma,sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;

    background:
    radial-gradient(circle at top left,#ffffff55 0%,transparent 25%),
    radial-gradient(circle at bottom right,#ffffff33 0%,transparent 30%),
    linear-gradient(135deg,#d8d8d8,#9d9d9d,#707070);
}

/* ลายจุดพื้นหลัง */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
    radial-gradient(rgba(255,255,255,.18) 2px,transparent 2px);
    background-size:40px 40px;
    z-index:0;
}

/* วงกลมพื้นหลัง */

.bg1,.bg2,.bg3{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:.45;
    animation:float 10s ease-in-out infinite;
}

.bg1{
    width:300px;
    height:300px;
    background:#ffffff;
    top:-80px;
    left:-80px;
}

.bg2{
    width:250px;
    height:250px;
    background:#bfbfbf;
    right:-60px;
    bottom:-60px;
    animation-delay:3s;
}

.bg3{
    width:180px;
    height:180px;
    background:#ededed;
    top:55%;
    left:65%;
    animation-delay:6s;
}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-25px);
}

}

/* กล่อง */

.container{
    width:380px;
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:35px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.35);
    position:relative;
    z-index:2;
}

/* หัวข้อ */

h1{
    color:#444;
    margin-bottom:20px;
}

/* รูป */

.profile{
    width:170px;
    height:170px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #666;
    box-shadow:0 8px 18px rgba(0,0,0,.3);
    margin-bottom:25px;
    transition:.4s;
}

.profile:hover{
    transform:scale(1.08) rotate(3deg);
}

/* เมนู */

a{
    display:block;
    text-decoration:none;
    background:#666;
    color:white;
    padding:12px;
    margin:12px 0;
    border-radius:10px;
    font-size:18px;
    transition:.3s;
}

a:hover{
    background:#333;
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 8px 20px rgba(0,0,0,.3);
}

/* หมา แมว */

.dog,.cat{
    position:absolute;
    top:-120px;
    font-size:60px;
    animation:fall 6s linear infinite;
    z-index:1;
}

.dog{
    left:15%;
}

.cat{
    right:15%;
    animation-delay:3s;
}

@keyframes fall{

0%{
transform:translateY(-120px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}

}

</style>

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>

<div class="dog">🐶</div>
<div class="cat">🐱</div>

<div class="container">

<h1>Portfolio นายกฤษฎา</h1>

<img src="WIN_20260716_14_03_02_Pro.jpg" class="profile" alt="รูปแนะนำตัว">

<a href="contact.html">📞 ช่องทางการติดต่อ</a>

</div>

</body>
</html>
